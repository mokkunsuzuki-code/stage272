name: stage241-multi-party

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  multi-party-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependency
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Build artifact
        run: |
          chmod +x tools/build_stage241_artifact.sh
          ./tools/build_stage241_artifact.sh

      - name: Check public keys exist
        run: |
          test -f keys/owner_public.pem
          test -f keys/auditor_public.pem

      - name: Check policy exists
        run: |
          test -f policy/policy.yaml

      - name: Check threshold verifier exists
        run: |
          python3 -m py_compile tools/verify_multi_party.py

      - name: Write CI note
        run: |
          mkdir -p out/multi_party
          cat > out/multi_party/ci_note.txt << 'EON'
          Stage241 CI validates the multi-party verification framework structure.
          Private signing keys are intentionally excluded from the repository,
          so threshold signing is performed outside CI.
          EON

      - name: Upload multi-party evidence
        uses: actions/upload-artifact@v6
        with:
          name: stage241-multi-party-evidence
          path: out/multi_party
