name: stage254-real-qsp-anchor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  qsp-session-anchor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (stage254)
        uses: actions/checkout@v5

      # ★ ここが追加（重要）
      - name: Checkout stage226
        run: |
          git clone https://github.com/mokkunsuzuki-code/stage226.git ../stage226

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cryptography opentimestamps-client

      - name: Run Stage254 real QSP anchor
        env:
          QSP_REAL_REPO: ../stage226
          QSP_REAL_RUN_CMD: python3 poc/run_poc.py
        run: |
          chmod +x tools/run_stage254_real_qsp_anchor.sh
          ./tools/run_stage254_real_qsp_anchor.sh

      - name: Create OTS stamp
        run: |
          ots stamp out/session/session_manifest.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Create cosign bundle
        run: |
          cosign sign-blob --yes \
            --bundle out/anchors/session_manifest.json.cosign.bundle \
            out/session/session_manifest.json

      - name: Create GitHub anchor receipt
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("out/session/session_manifest.json").read_text(encoding="utf-8"))
          receipt = {
              "schema": "github_session_anchor_receipt/v1",
              "repository": "${{ github.repository }}",
              "workflow": "stage254-real-qsp-anchor",
              "run_id": "${{ github.run_id }}",
              "run_attempt": "${{ github.run_attempt }}",
              "commit_sha": "${{ github.sha }}",
              "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "manifest_sha256": manifest["manifest_sha256"],
          }

          Path("out/anchors/github_session_anchor_receipt.json").write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage254-real-qsp-anchor-artifacts
          path: |
            out/session
            out/witnesses
            out/checkpoints
            out/anchors
            keys
