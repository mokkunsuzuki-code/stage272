name: stage250-release-anchor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-anchor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare transparency input from checkpoint history
        run: |
          set -euo pipefail

          test -f out/review_log_history/checkpoint_index.json
          mkdir -p out/transparency/history

          cp out/review_log_history/checkpoint_index.json out/transparency/checkpoint_index.json
          cp out/review_log_history/checkpoint_*.json out/transparency/history/

          LATEST_CHECKPOINT=$(find out/review_log_history -name 'checkpoint_*.json' | sort | tail -n 1)
          test -n "$LATEST_CHECKPOINT"
          cp "$LATEST_CHECKPOINT" out/transparency/checkpoint.json

          sha256sum out/transparency/checkpoint.json | awk '{print $1}' > out/transparency/root.txt

      - name: Generate Stage249 anchor request
        run: |
          chmod +x tools/generate_anchor_request.py
          python3 tools/generate_anchor_request.py

      - name: Generate Stage250 release manifest
        run: |
          chmod +x tools/generate_release_manifest.py
          python3 tools/generate_release_manifest.py --release-tag stage250-v1

      - name: Record release anchor receipt
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          chmod +x tools/record_release_anchor_receipt.py
          python3 tools/record_release_anchor_receipt.py

      - name: Verify release anchor
        run: |
          chmod +x tools/verify_release_anchor.py
          python3 tools/verify_release_anchor.py \
            --manifest out/release_anchor/release_manifest.json \
            --receipt out/release_anchor/github_release_anchor_receipt.json

      - name: Upload release anchor artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage250-release-anchor-artifacts
          path: out/release_anchor
