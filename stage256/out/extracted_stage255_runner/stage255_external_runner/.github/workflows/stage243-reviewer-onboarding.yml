name: stage243-reviewer-onboarding

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  reviewer-onboarding-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest cryptography

      - name: Verify empty registry should fail
        run: |
          mkdir -p metadata/reviewers
          cat > metadata/reviewers/reviewer_registry.yaml << 'REG'
          version: 1

          reviewers: []
          REG

          set +e
          python tools/verify_stage243_registry.py
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "registry unexpectedly passed without active reviewer"
            exit 1
          fi
          echo "[OK] failed safely without active reviewer"

      - name: Add example reviewer public key
        run: |
          mkdir -p keys
          cat > keys/reviewer_example_public.pem << 'KEY'
          -----BEGIN PUBLIC KEY-----
          MCowBQYDK2VwAyEA1111111111111111111111111111111111111111111=
          -----END PUBLIC KEY-----
          KEY

      - name: Register example reviewer
        run: |
          python tools/register_reviewer.py \
            --reviewer-id reviewer_example \
            --display-name "Example Reviewer" \
            --contact "example@example.com" \
            --key-path keys/reviewer_example_public.pem \
            --key-fingerprint "SHA256:examplefingerprint" \
            --status active \
            --scope release_manifest approval_policy

      - name: Verify registry should pass
        run: python tools/verify_stage243_registry.py

      - name: Build stage243 manifest
        run: python tools/build_stage243_manifest.py

      - name: Run tests
        run: pytest -q tests/test_stage243_registry.py
