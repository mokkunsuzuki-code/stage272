name: stage266-verified-public-evidence

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-status-and-pages:
    runs-on: ubuntu-latest

    env:
      REPO_OWNER: mokkunsuzuki-code
      REPO_NAME: stage266
      MANIFEST_PATH: out/release/release_manifest.json
      OTS_PATH: out/release/release_manifest.json.ots
      RECEIPT_PATH: out/release/github_actions_receipt.json

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install OpenTimestamps
        run: |
          python3 -m pip install --upgrade pip
          pip3 install opentimestamps-client
          which ots

      - name: Generate Stage265 artifacts
        run: |
          chmod +x tools/run_stage265_public_verification.sh
          ./tools/run_stage265_public_verification.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Ensure docs/status exists
        run: mkdir -p docs/status

      - name: OTS upgrade
        run: |
          if [ -f "${OTS_PATH}" ]; then
            ots upgrade "${OTS_PATH}" || true
          fi

      - name: Generate status JSON
        run: node tools/generate_stage266_status.js

      - name: Show status
        run: cat docs/status/verification_status.json

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build-status-and-pages
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
